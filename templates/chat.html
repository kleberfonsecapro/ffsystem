{% extends 'base.html' %}

{% block title %}Assistente IA - SmartFinance AI{% endblock %}

{% block content %}
<div class="topbar">
    <h1 class="page-title"><i class="fa-solid fa-robot" style="color: var(--accent-blue);"></i> Assistente Financeiro IA</h1>
</div>

<div class="card chat-container">
    <div class="chat-messages" id="chat-messages">
        <div class="message msg-ai">
            <strong>Agente Financeiro IA</strong><br>
            Olá! Eu sou o seu Assistente Financeiro IA. Como posso ajudar com suas finanças hoje?
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" class="chat-input" placeholder="Pergunte sobre seus gastos, peça dicas de economia...">
        <button onclick="sendMessage()" class="btn-primary">
            <i class="fa-solid fa-paper-plane"></i> Enviar
        </button>
    </div>
</div>

<script>
function escapeHtml(text) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
}

function addMessage(className, sender, text) {
    const chatBox = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'message ' + className;
    const strong = document.createElement('strong');
    strong.textContent = sender;
    div.appendChild(strong);
    div.appendChild(document.createElement('br'));
    div.appendChild(document.createTextNode(text));
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;

    addMessage('msg-user', 'Você', msg);
    input.value = '';

    const formData = new FormData();
    formData.append('message', msg);
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

    fetch("{% url 'intelligence:chat_api' %}", {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        addMessage('msg-ai', 'Agente Financeiro IA', data.reply || '');
    })
    .catch(error => console.error('Error:', error));
}

document.getElementById('chat-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        sendMessage();
    }
});
</script>
{% endblock %}
