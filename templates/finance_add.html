{% extends 'base.html' %}

{% block title %}Nova Transação - SmartFinance AI{% endblock %}

{% block content %}
<div class="topbar">
    <h1 class="page-title">Registrar Movimentação</h1>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form method="POST" action="{% url 'finance:add' %}">
        {% csrf_token %}
        <div class="form-group">
            <label>Descrição</label>
            <input type="text" name="description" class="form-control" required placeholder="Ex: Salário, Mercado...">
        </div>
        
        <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" step="0.01" name="amount" class="form-control" required placeholder="0.00">
        </div>
        
        <div class="form-group">
            <label>Data</label>
            <input type="date" name="date" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label>Categoria</label>
            <select name="category" class="form-control" required>
                <option value="Salário">Salário</option>
                <option value="Alimentação">Alimentação</option>
                <option value="Transporte">Transporte</option>
                <option value="Lazer">Lazer</option>
                <option value="Moradia">Moradia</option>
                <option value="Outros">Outros</option>
            </select>
        </div>
        
        <div class="form-group" style="margin-bottom: 2rem;">
            <label>Tipo de Movimentação</label>
            <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: white;">
                    <input type="radio" name="type" value="receita" required> Receita
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: white;">
                    <input type="radio" name="type" value="despesa" required> Despesa
                </label>
            </div>
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Salvar Transação</button>
    </form>
</div>
{% endblock %}
