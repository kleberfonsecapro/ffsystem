{% extends 'base.html' %}

{% block title %}Senha Redefinida - SmartFinance AI{% endblock %}

{% block login_content %}
<div class="login-container">
    <div class="glass-panel login-card" style="text-align: center;">
        <div style="font-size: 3rem; margin-bottom: 1rem; color: var(--accent-green);">
            <i class="fa-solid fa-lock-open"></i>
        </div>
        <h1>Senha Alterada com Sucesso!</h1>
        <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">
            Sua senha foi redefinida. Agora você pode fazer login com a nova senha.
        </p>

        <div style="margin-top: 2rem;">
            <a href="{% url 'users:login' %}" class="btn-primary" style="display: inline-block;">Fazer Login</a>
        </div>
    </div>
</div>
{% endblock %}
