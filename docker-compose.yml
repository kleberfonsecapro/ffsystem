services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-ffsystem}
      - POSTGRES_USER=${DB_USER:-ffsystem}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?error}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ffsystem} -d ${DB_NAME:-ffsystem}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  web:
    build: .
    container_name: ffsystem_web
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - SECRET_KEY=${SECRET_KEY:?error}
      - DEBUG=${DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,ffsystem.giize.com}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://ffsystem.giize.com}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://ffsystem.giize.com}
      - DB_NAME=${DB_NAME:-ffsystem}
      - DB_USER=${DB_USER:-ffsystem}
      - DB_PASSWORD=${DB_PASSWORD:?error}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:?error}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - traefik_global

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  internal:
    driver: bridge
  traefik_global:
    external: true
    name: traefik_global
